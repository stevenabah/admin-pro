# ============================================
# Kubernetes Secrets
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: admin-pro-secrets
  namespace: admin-pro
type: Opaque
stringData:
  # CHANGE THESE VALUES IN PRODUCTION
  DATABASE_URL: "postgresql://admin_pro:CHANGE_ME@postgres:5432/admin_pro?schema=public"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_SECRET_KEY_AT_LEAST_32_CHARACTERS"
  REDIS_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-pro-tls
  namespace: admin-pro
type: kubernetes.io/tls
stringData:
  # Replace with actual certificate data
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    YOUR_CERTIFICATE_HERE
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    YOUR_PRIVATE_KEY_HERE
    -----END PRIVATE KEY-----
