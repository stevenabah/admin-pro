# ============================================
# Docker Compose - Full Stack Application
# ============================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: admin-pro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: admin_pro
      POSTGRES_USER: admin_pro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pro_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - admin-pro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_pro -d admin_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: admin-pro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - admin-pro-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: admin-pro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://admin_pro:${POSTGRES_PASSWORD:-admin_pro_password}@postgres:5432/admin_pro?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - admin-pro-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-raster", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web UI
  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    container_name: admin-pro-frontend
    restart: unless-stopped
    volumes:
      - ./docker/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - admin-pro-network
    depends_on:
      - backend

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: admin-pro-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/logs:/var/log/nginx
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - admin-pro-network
    depends_on:
      - frontend
      - backend

networks:
  admin-pro-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
